# Nginx Configuration for PR Preview Environments (Cloudflare Ready)
#
# This configuration listens on port 80 and relies on Cloudflare to handle
# HTTPS and certificate management.
#
# INSTALLATION INSTRUCTIONS:
# ==========================
# This file contains TWO parts that must be installed separately:
#
# PART 1 - Map Directives (http context):
#   Save the map blocks to: /etc/nginx/conf.d/propr-maps.conf
#   This file is automatically included in the http{} context.
#
# PART 2 - Server Block:
#   Save the server block to: /etc/nginx/sites-available/propr-wildcard
#   Enable with: ln -s /etc/nginx/sites-available/propr-wildcard /etc/nginx/sites-enabled/
#
# Supports PR IDs from 1-9999
#
# Port Mapping:
#   - UI:  10000 + PR_ID (e.g., PR 123 -> port 10123)
#   - API: 20000 + PR_ID (e.g., PR 123 -> port 20123)
#
# URL Patterns:
#   - UI:  pr-{id}.gitfix.dev
#   - API: pr-{id}-api.gitfix.dev
#
# Important Cloudflare Settings:
#   1. SSL/TLS Encryption Mode: Set to "Flexible" or "Full" (non-strict)
#   2. Always Use HTTPS: Enabled (Edge Settings)
#   3. DNS Records: Ensure *.gitfix.dev is proxied (Orange Cloud)
#

# ============================================================
# PART 1: Save this to /etc/nginx/conf.d/propr-maps.conf
# ============================================================

# Combined target port mapping (UI or API)
# Uses named captures to extract PR ID and calculate port
map $host $target_port {
    default "";

    # UI routes: pr-{id}.gitfix.dev -> port 10000 + ID
    # 1-digit PRs (1-9)
    "~^pr-([0-9])\.gitfix\.dev$"           "1000$1";
    # 2-digit PRs (10-99)
    "~^pr-([0-9]{2})\.gitfix\.dev$"        "100$1";
    # 3-digit PRs (100-999)
    "~^pr-([0-9]{3})\.gitfix\.dev$"        "10$1";
    # 4-digit PRs (1000-9999)
    "~^pr-([0-9]{4})\.gitfix\.dev$"        "1$1";

    # API routes: pr-{id}-api.gitfix.dev -> port 20000 + ID
    # 1-digit PRs (1-9)
    "~^pr-([0-9])-api\.gitfix\.dev$"       "2000$1";
    # 2-digit PRs (10-99)
    "~^pr-([0-9]{2})-api\.gitfix\.dev$"    "200$1";
    # 3-digit PRs (100-999)
    "~^pr-([0-9]{3})-api\.gitfix\.dev$"    "20$1";
    # 4-digit PRs (1000-9999)
    "~^pr-([0-9]{4})-api\.gitfix\.dev$"    "2$1";
}

# ============================================================
# PART 2: Save this to /etc/nginx/sites-available/propr-wildcard
# ============================================================

server {
    listen 80;
    server_name *.gitfix.dev;

    location / {
        # Return 404 if no PR environment matched
        if ($target_port = "") {
            return 404;
        }

        proxy_pass http://127.0.0.1:$target_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Important for Cloudflare: Pass the original client IP
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
