# Nginx Configuration for PR Preview Environments (Cloudflare Ready)
#
# This configuration listens on port 80 and relies on Cloudflare to handle
# HTTPS and certificate management.
#
# File Location: /etc/nginx/sites-available/gitfix-wildcard
# Enable with: ln -s /etc/nginx/sites-available/gitfix-wildcard /etc/nginx/sites-enabled/
#
# Supports PR IDs from 100-9999 (3-digit and 4-digit PR numbers)
#
# Port Mapping:
#   - UI:  10000 + PR_ID (e.g., PR 123 -> port 10123)
#   - API: 20000 + PR_ID (e.g., PR 123 -> port 20123)
#
# URL Patterns:
#   - UI:  pr-{id}.gitfix.dev
#   - API: pr-{id}-api.gitfix.dev
#
# Important Cloudflare Settings:
#   1. SSL/TLS Encryption Mode: Set to "Flexible" or "Full" (non-strict)
#   2. Always Use HTTPS: Enabled (Edge Settings)
#   3. DNS Records: Ensure *.gitfix.dev is proxied (Orange Cloud)
#

# --------------------------------------------------------
# Map directives for extracting PR ID and calculating ports
# These must be placed outside the server block (in http context)
# --------------------------------------------------------

# UI Routing: pr-{id}.gitfix.dev -> port 10000 + ID
map $host $ui_target_port {
    default "";
    # 3-Digit PRs: pr-123.gitfix.dev -> port 10123
    ~^pr-(?<pr_id>[0-9]{3})\.gitfix\.dev$ "10$pr_id";
    # 4-Digit PRs: pr-1234.gitfix.dev -> port 11234
    ~^pr-(?<pr_id>[0-9]{4})\.gitfix\.dev$ "1$pr_id";
}

# API Routing: pr-{id}-api.gitfix.dev -> port 20000 + ID
map $host $api_target_port {
    default "";
    # 3-Digit PRs: pr-123-api.gitfix.dev -> port 20123
    ~^pr-(?<pr_id>[0-9]{3})-api\.gitfix\.dev$ "20$pr_id";
    # 4-Digit PRs: pr-1234-api.gitfix.dev -> port 21234
    ~^pr-(?<pr_id>[0-9]{4})-api\.gitfix\.dev$ "2$pr_id";
}

# Combined target port (UI or API)
map $host $target_port {
    default "";
    # UI routes
    ~^pr-(?<pr_id>[0-9]{3})\.gitfix\.dev$ "10$pr_id";
    ~^pr-(?<pr_id>[0-9]{4})\.gitfix\.dev$ "1$pr_id";
    # API routes
    ~^pr-(?<pr_id>[0-9]{3})-api\.gitfix\.dev$ "20$pr_id";
    ~^pr-(?<pr_id>[0-9]{4})-api\.gitfix\.dev$ "2$pr_id";
}

server {
    listen 80;
    server_name *.gitfix.dev;

    # --------------------------------------------------------
    # Proxy Logic
    # --------------------------------------------------------
    location / {
        # Return 404 if no PR environment matched
        if ($target_port = "") {
            return 404 "PR Environment Not Found";
        }

        proxy_pass http://127.0.0.1:$target_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Important for Cloudflare: Pass the original client IP
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
