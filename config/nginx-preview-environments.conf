# Nginx Configuration for PR Preview Environments
#
# This configuration should be applied to the server's Nginx instance.
# It uses regex capture groups to route traffic based on the subdomain.
#
# File Location: /etc/nginx/sites-available/gitfix-wildcard
# Enable with: ln -s /etc/nginx/sites-available/gitfix-wildcard /etc/nginx/sites-enabled/
#
# Supports PR IDs from 100-9999 (3-digit and 4-digit PR numbers)
#
# Port Mapping:
#   - UI:  10000 + PR_ID (e.g., PR 123 -> port 10123)
#   - API: 20000 + PR_ID (e.g., PR 123 -> port 20123)
#
# URL Patterns:
#   - UI:  pr-{id}.gitfix.dev
#   - API: pr-{id}-api.gitfix.dev
#

server {
    listen 80;
    server_name *.gitfix.dev;

    # Initialize variable
    set $target_port "";

    # --------------------------------------------------------
    # UI Routing (Port 10000 + ID)
    # matches: pr-123.gitfix.dev, pr-1234.gitfix.dev
    # --------------------------------------------------------

    # 3-Digit PRs (100-999) -> 10100-10999
    if ($host ~* ^pr-(\d{3})\.gitfix\.dev$) {
        set $pr_id $1;
        set $target_port 10$pr_id;
    }

    # 4-Digit PRs (1000-9999) -> 11000-19999
    if ($host ~* ^pr-(\d{4})\.gitfix\.dev$) {
        set $pr_id $1;
        set $target_port 1$pr_id;
    }

    # --------------------------------------------------------
    # API Routing (Port 20000 + ID)
    # matches: pr-123-api.gitfix.dev, pr-1234-api.gitfix.dev
    # --------------------------------------------------------

    # 3-Digit PRs (100-999) -> 20100-20999
    if ($host ~* ^pr-(\d{3})-api\.gitfix\.dev$) {
        set $pr_id $1;
        set $target_port 20$pr_id;
    }

    # 4-Digit PRs (1000-9999) -> 21000-29999
    if ($host ~* ^pr-(\d{4})-api\.gitfix\.dev$) {
        set $pr_id $1;
        set $target_port 2$pr_id;
    }

    # --------------------------------------------------------
    # Proxy Logic
    # --------------------------------------------------------
    location / {
        # Fallback if no regex matched
        if ($target_port = "") {
            return 404 "PR Environment Not Found";
        }

        proxy_pass http://127.0.0.1:$target_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-running connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Optional: HTTPS Configuration (requires wildcard certificate)
# Uncomment and configure after obtaining a wildcard SSL certificate
#
# server {
#     listen 443 ssl http2;
#     server_name *.gitfix.dev;
#
#     ssl_certificate /etc/letsencrypt/live/gitfix.dev/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/gitfix.dev/privkey.pem;
#
#     # Include the same routing logic as above
#     # ...
# }
