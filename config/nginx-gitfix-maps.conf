# Gitfix PR Preview Environment - Map Directives
# Install to: /etc/nginx/conf.d/gitfix-maps.conf
#
# IMPORTANT: This file MUST be in the http{} context, NOT inside a server block.
# Files in /etc/nginx/conf.d/ are automatically included in the http{} context.

# Combined target port mapping (UI or API)
# Maps subdomain patterns to calculated port numbers
map $host $target_port {
    default "";

    # UI routes: pr-{id}.gitfix.dev -> port 10000 + ID
    # 1-digit PRs (1-9)
    "~^pr-([0-9])\.gitfix\.dev$"           "1000$1";
    # 2-digit PRs (10-99)
    "~^pr-([0-9]{2})\.gitfix\.dev$"        "100$1";
    # 3-digit PRs (100-999)
    "~^pr-([0-9]{3})\.gitfix\.dev$"        "10$1";
    # 4-digit PRs (1000-9999)
    "~^pr-([0-9]{4})\.gitfix\.dev$"        "1$1";

    # API routes: pr-{id}-api.gitfix.dev -> port 20000 + ID
    # 1-digit PRs (1-9)
    "~^pr-([0-9])-api\.gitfix\.dev$"       "2000$1";
    # 2-digit PRs (10-99)
    "~^pr-([0-9]{2})-api\.gitfix\.dev$"    "200$1";
    # 3-digit PRs (100-999)
    "~^pr-([0-9]{3})-api\.gitfix\.dev$"    "20$1";
    # 4-digit PRs (1000-9999)
    "~^pr-([0-9]{4})-api\.gitfix\.dev$"    "2$1";
}
