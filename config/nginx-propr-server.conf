# ProPR PR Preview Environment - Server Block
# Install to: /etc/nginx/sites-available/propr-wildcard
# Enable with: ln -s /etc/nginx/sites-available/propr-wildcard /etc/nginx/sites-enabled/
#
# PREREQUISITE: The map directives must be installed first.
# Copy nginx-propr-maps.conf to /etc/nginx/conf.d/propr-maps.conf

server {
    listen 80;
    server_name *.gitfix.dev;

    location / {
        # Return 404 if no PR environment matched
        if ($target_port = "") {
            return 404;
        }

        proxy_pass http://127.0.0.1:$target_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Important for Cloudflare: Pass the original client IP
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
