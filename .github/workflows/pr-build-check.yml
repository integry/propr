name: Build & Lint Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-build-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Changes
    runs-on: [self-hosted, linux, x64, propr]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check Node.js
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Run Fast Unit Tests
        id: unit_tests
        run: |
          echo "Running fast unit tests (no Redis/Docker dependencies)..."
          npm run test:unit
          echo "✅ Fast unit tests passed"

      - name: Run Hosted Tunnel Regression Tests
        id: tunnel_tests
        run: |
          echo "Running hosted tunnel regression tests..."
          PROPR_DEMO_MODE=true npx tsx --test \
            test/orchestratorConfig.test.mjs \
            packages/cli/src/commands/tunnelCommand.test.ts \
            test/orchestratorTunnelLifecycle.test.mjs \
            test/orchestratorTunnelStatus.test.mjs \
            test/orchestratorProprUrlsDrift.test.ts \
            test/routingWebSocketProtocol.test.ts \
            test/routingWebSocketIntakeService.test.ts \
            packages/api/test/corsValidation.test.ts
          npm run build -w @propr/shared
          npm --workspace propr-ui test -- runtimeConfig.test.ts compatibility.test.ts
          echo "✅ Hosted tunnel regression tests passed"

      - name: Verify CLI Release Package
        id: cli_pack
        run: |
          echo "Verifying propr-cli release package..."
          npm run cli:pack
          echo "✅ propr-cli release package verified"

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            core:
              - 'src/**'
              - 'Dockerfile*'
              - 'package*.json'
              - 'packages/shared/**'
            ui:
              - 'propr-ui/**'
              - 'packages/shared/**'
            docs:
              - 'docs/**'
            api:
              - 'packages/api/**'
              - 'packages/shared/**'
            core_package:
              - 'packages/core/**'
              - 'packages/shared/**'

      - name: Run Checks
        id: build
        continue-on-error: true
        run: |
          # Initialize log
          touch build_log.txt
          EXIT_CODE=0
          echo "Starting validation process..." > build_log.txt
          SHARED_BUILT=0
          SHARED_FAILED=0
          CORE_PKG_BUILT=0
          CORE_PKG_FAILED=0

          build_shared_once() {
            if [ $SHARED_BUILT -eq 1 ]; then
              return $SHARED_FAILED
            fi

            echo "Building @propr/shared (dependency)..."
            SHARED_OUTPUT=$(npm run build -w @propr/shared 2>&1) || {
              SHARED_FAILED=1
              SHARED_BUILT=1
              return 1
            }

            SHARED_BUILT=1
            return 0
          }

          build_core_package_once() {
            if [ $CORE_PKG_BUILT -eq 1 ]; then
              return $CORE_PKG_FAILED
            fi

            echo "Building @propr/core (dependency)..."
            CORE_BUILD_OUTPUT=$(npm run build -w @propr/core 2>&1) || {
              CORE_PKG_FAILED=1
              CORE_PKG_BUILT=1
              return 1
            }

            CORE_PKG_BUILT=1
            return 0
          }

          # --- CORE ---
          if [ "${{ steps.filter.outputs.core }}" == 'true' ]; then
            echo -e "\n--- Core Service: Lint & Build ---" >> build_log.txt
            CORE_FAILED=0

            # Dependencies already installed in earlier step
            LINT_OUTPUT=$(npm run lint -- --max-warnings 0 2>&1) || {
              echo "❌ Core Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              CORE_FAILED=1
              EXIT_CODE=1
            }
            if [ $CORE_FAILED -eq 0 ]; then
              echo "✅ Core Lint passed" >> build_log.txt
            fi

            BUILD_OUTPUT=$(npm run build 2>&1) || {
              echo "❌ Core Source Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              CORE_FAILED=1
              EXIT_CODE=1
            }
            if [ $CORE_FAILED -eq 0 ]; then
              echo "✅ Core Source Build passed" >> build_log.txt
            fi
          fi

          # --- UI ---
          if [ "${{ steps.filter.outputs.ui }}" == 'true' ]; then
            echo -e "\n--- UI: Lint & Build ---" >> build_log.txt
            UI_FAILED=0

            # Dependencies already installed in earlier step
            if ! build_shared_once; then
              echo "❌ Shared Package Build FAILED (UI dependency)" >> build_log.txt
              echo "$SHARED_OUTPUT" >> build_log.txt
              UI_FAILED=1
              EXIT_CODE=1
            fi

            if [ $UI_FAILED -eq 0 ]; then
              # Lint UI
              LINT_OUTPUT=$(npm run lint -w propr-ui -- --max-warnings 0 2>&1) || {
                echo "❌ UI Lint FAILED" >> build_log.txt
                echo "$LINT_OUTPUT" >> build_log.txt
                UI_FAILED=1
                EXIT_CODE=1
              }
              if [ $UI_FAILED -eq 0 ]; then
                echo "✅ UI Lint passed" >> build_log.txt
              fi
            fi

            BUILD_OUTPUT=$(npm run build -w propr-ui 2>&1) || {
              echo "❌ UI Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              EXIT_CODE=1
              UI_FAILED=1
            }
            if [ $UI_FAILED -eq 0 ]; then
              echo "✅ UI Build passed" >> build_log.txt
            fi
          fi

          # --- DOCS ---
          if [ "${{ steps.filter.outputs.docs }}" == 'true' ]; then
            echo -e "\n--- Docs: Typecheck & Build ---" >> build_log.txt
            DOCS_FAILED=0
            
            cd docs
            INSTALL_OUTPUT=$(npm ci 2>&1) || {
              echo "❌ Docs Dependency Install FAILED" >> ../build_log.txt
              echo "$INSTALL_OUTPUT" | tail -50 >> ../build_log.txt
              DOCS_FAILED=1
              EXIT_CODE=1
            }
            
            if [ $DOCS_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck 2>&1) || {
                echo "❌ Docs Typecheck FAILED" >> ../build_log.txt
                echo "$TYPECHECK_OUTPUT" >> ../build_log.txt
                DOCS_FAILED=1
                EXIT_CODE=1
              }
              if [ $DOCS_FAILED -eq 0 ]; then
                echo "✅ Docs Typecheck passed" >> ../build_log.txt
              fi
            fi

            if [ $DOCS_FAILED -eq 0 ]; then
              BUILD_OUTPUT=$(npm run build 2>&1) || {
                echo "❌ Docs Build FAILED" >> ../build_log.txt
                echo "$BUILD_OUTPUT" | tail -100 >> ../build_log.txt
                DOCS_FAILED=1
                EXIT_CODE=1
              }
              if [ $DOCS_FAILED -eq 0 ]; then
                echo "✅ Docs Build passed" >> ../build_log.txt
              fi
            fi
            cd ..
          fi

          # --- CORE PACKAGE ---
          if [ "${{ steps.filter.outputs.core_package }}" == 'true' ]; then
            echo -e "\n--- Core Package: Build & Lint ---" >> build_log.txt
            CORE_PKG_FAILED=0

            # Dependencies already installed in earlier step
            if ! build_shared_once; then
              echo "❌ Shared Package Build FAILED (core dependency)" >> build_log.txt
              echo "$SHARED_OUTPUT" >> build_log.txt
              CORE_PKG_FAILED=1
              EXIT_CODE=1
            fi

            if [ $CORE_PKG_FAILED -eq 0 ]; then
              # 1. Build Verification
              if ! build_core_package_once; then
                echo "❌ Core Package Build FAILED" >> build_log.txt
                echo "$CORE_BUILD_OUTPUT" >> build_log.txt
                CORE_PKG_FAILED=1
                EXIT_CODE=1
              fi
              if [ $CORE_PKG_FAILED -eq 0 ]; then
                echo "✅ Core Package Build passed" >> build_log.txt
              fi
            fi

            if [ $CORE_PKG_FAILED -eq 0 ]; then
              # 2. Lint Verification
              echo "Linting @propr/core..."
              LINT_OUTPUT=$(npm run lint -w @propr/core -- --max-warnings 0 2>&1) || {
                echo "❌ Core Package Lint FAILED" >> build_log.txt
                echo "$LINT_OUTPUT" >> build_log.txt
                CORE_PKG_FAILED=1
                EXIT_CODE=1
              }
              if [ $CORE_PKG_FAILED -eq 0 ]; then
                echo "✅ Core Package Lint passed" >> build_log.txt
              fi
            fi
          fi

          # --- API ---
          if [ "${{ steps.filter.outputs.api }}" == 'true' ]; then
            echo -e "\n--- API: Build & Lint ---" >> build_log.txt
            API_FAILED=0

            # Dependencies already installed in earlier step
            if ! build_shared_once; then
              echo "❌ Shared Package Build FAILED (api dependency)" >> build_log.txt
              echo "$SHARED_OUTPUT" >> build_log.txt
              API_FAILED=1
              EXIT_CODE=1
            fi

            if [ $API_FAILED -eq 0 ]; then
              # 1. Build @propr/core first (api depends on it)
              if ! build_core_package_once; then
                echo "❌ Core Package Build FAILED (api dependency)" >> build_log.txt
                echo "$CORE_BUILD_OUTPUT" >> build_log.txt
                API_FAILED=1
                EXIT_CODE=1
              fi
            fi

            if [ $API_FAILED -eq 0 ]; then
              # 2. Build Verification
              echo "Building @propr/api..."
              BUILD_OUTPUT=$(npm run build -w @propr/api 2>&1) || {
                echo "❌ API Build FAILED" >> build_log.txt
                echo "$BUILD_OUTPUT" >> build_log.txt
                API_FAILED=1
                EXIT_CODE=1
              }
              if [ $API_FAILED -eq 0 ]; then
                echo "✅ API Build passed" >> build_log.txt
              fi
            fi

            if [ $API_FAILED -eq 0 ]; then
              # 3. Lint Verification
              echo "Linting @propr/api..."
              LINT_OUTPUT=$(npm run lint -w @propr/api -- --max-warnings 0 2>&1) || {
                echo "❌ API Lint FAILED" >> build_log.txt
                echo "$LINT_OUTPUT" >> build_log.txt
                API_FAILED=1
                EXIT_CODE=1
              }
              if [ $API_FAILED -eq 0 ]; then
                echo "✅ API Lint passed" >> build_log.txt
              fi
            fi

          fi

          exit $EXIT_CODE

      - name: Post Failure Comment
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LOG_FILE=build_log.txt
          if [ ! -f "$LOG_FILE" ]; then
            printf '%s\n' 'Log file missing.' > "$LOG_FILE"
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path

          log = Path("build_log.txt").read_text()
          if len(log) > 60000:
              log = log[:60000] + "\n\n...(truncated)"

          run_url = os.environ["RUN_URL"]
          body = "\n".join([
              "### Checks Failed",
              "Linting or build errors were detected.",
              "",
              "<details>",
              "<summary>View Logs</summary>",
              "",
              "~~~text",
              log,
              "~~~",
              "</details>",
              "",
              f"**[View Workflow]({run_url})**",
          ])

          Path("failure_comment.md").write_text(body)
          PY
          gh api \
            --method POST \
            repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
            -f body="$(cat failure_comment.md)"

      - name: Fail Job
        if: steps.build.outcome == 'failure'
        run: exit 1
