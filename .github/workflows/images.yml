name: Docker Images

# Builds all production Docker images.
#
# - on push to main / PR: builds everything, runs the smoke test, no push
# - on tag push (v*):     builds, smoke-tests, pushes to Docker Hub + GHCR
#
# Required repository secrets for release push:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  — Docker Hub credentials
#   (GHCR uses the built-in GITHUB_TOKEN)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to registries'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine push mode
        id: mode
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push }}" == "true" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        if: steps.mode.outputs.push == 'false'
        run: ./scripts/build-images.sh

      - name: Build + push images
        if: steps.mode.outputs.push == 'true'
        run: ./scripts/build-images.sh --push

      - name: Smoke test
        if: steps.mode.outputs.push == 'false'
        run: ./scripts/smoke-test-images.sh

      - name: Image sizes
        run: docker images --format 'table {{.Repository}}:{{.Tag}}\t{{.Size}}' | grep -E '(propr/|REPOSITORY)'
