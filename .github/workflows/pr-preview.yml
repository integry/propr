name: PR Preview

on:
  pull_request_target:
    types: [labeled, unlabeled, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  # Authorization is based on WHO applied the preview-env label, not who
  # authored the PR. Our PRs are opened by an automation bot whose
  # author_association is CONTRIBUTOR, so gating on the author permanently
  # blocked bot-authored previews. Applying a label already requires triage+
  # access, but we additionally verify the label actor has write/admin on the
  # repo before running PR code on the self-hosted runner. Fail-closed.
  authorize:
    name: Authorize label actor
    runs-on: ubuntu-latest
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'preview-env' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Verify label actor has write access
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          http_status="$(curl -sS -o perm.json -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission")"
          if [ "$http_status" != "200" ]; then
            echo "::error::Could not resolve repository permission for '$ACTOR' (HTTP $http_status). Denying preview deploy."
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          permission="$(jq -r '.permission' perm.json)"
          echo "Label actor '$ACTOR' has repository permission: $permission"
          if [ "$permission" = "admin" ] || [ "$permission" = "write" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::'$ACTOR' lacks write access (permission: $permission). Denying preview deploy."
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Preview
    needs: authorize
    if: needs.authorize.outputs.approved == 'true'
    # The propr label must target the single host that owns preview Docker stacks.
    runs-on: [self-hosted, linux, x64, propr]
    timeout-minutes: 45
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_HAS_DEMO_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'demo') }}
      STAGING_ENV_FILE: ${{ vars.PR_PREVIEW_STAGING_ENV_FILE }}
      STAGING_DB_PATH: ${{ vars.PR_PREVIEW_STAGING_DB_PATH }}
      PR_CHECKOUT_DIR: pr-checkout/pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Validate preview configuration
        run: |
          for tool in curl jq git docker; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Required tool '$tool' is not installed on the self-hosted runner."
              exit 1
            fi
          done
          if [ -z "$STAGING_ENV_FILE" ]; then
            echo "::error::Set the PR_PREVIEW_STAGING_ENV_FILE repository variable to the staging .env path on the self-hosted runner."
            exit 1
          fi
          if [ ! -f "$STAGING_ENV_FILE" ]; then
            echo "::error::PR_PREVIEW_STAGING_ENV_FILE points to '$STAGING_ENV_FILE', but that file does not exist on the self-hosted runner."
            exit 1
          fi
          if [ -n "$STAGING_DB_PATH" ] && [ ! -f "$STAGING_DB_PATH" ]; then
            echo "::warning::PR_PREVIEW_STAGING_DB_PATH points to '$STAGING_DB_PATH', but that file does not exist. deploy-pr.sh will fall back to DB_FILENAME from the staging env file."
          fi

      - name: Validate approved PR SHA
        run: |
          set -e
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "::error::Could not determine PR head SHA from the label event payload."
            exit 1
          fi

      - name: Checkout approved PR source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PR_HEAD_SHA }}
          path: ${{ env.PR_CHECKOUT_DIR }}
          persist-credentials: false

      - name: Sanitize PR checkout credentials
        env:
          PR_SOURCE_DIR: ${{ github.workspace }}/${{ env.PR_CHECKOUT_DIR }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          git -C "$PR_SOURCE_DIR" remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "$PR_SOURCE_DIR" config --local --get-regexp '^http\..*\.extraheader$' 2>/dev/null |
            cut -d' ' -f1 |
            while IFS= read -r key; do
              git -C "$PR_SOURCE_DIR" config --local --unset-all "$key" || true
            done

      - name: Deploy approved PR preview
        id: deploy_preview
        # This still runs same-repository PR code on self-hosted infrastructure.
        # The preview-env label is the maintainer approval gate for this exact
        # deployment event. New commits require removing and re-adding the label
        # before redeployment.
        # Fork PR previews are intentionally blocked because compose builds run
        # PR-controlled code against the self-hosted Docker daemon.
        env:
          PR_SOURCE_DIR: ${{ github.workspace }}/${{ env.PR_CHECKOUT_DIR }}
        run: |
          env -i \
            HOME="$HOME" \
            PATH="$PATH" \
            GITHUB_ACTIONS="$GITHUB_ACTIONS" \
            PR_SOURCE_DIR="$PR_SOURCE_DIR" \
            PR_HEAD_SHA="$PR_HEAD_SHA" \
            PR_HAS_DEMO_LABEL="$PR_HAS_DEMO_LABEL" \
            STAGING_ENV_FILE="$STAGING_ENV_FILE" \
            STAGING_DB_PATH="$STAGING_DB_PATH" \
            sh ./scripts/deploy-pr.sh "$PR_NUMBER"

      - name: Post preview comment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          comment_marker="<!-- preview-env-comment -->"
          ui_url="https://pr-${PR_NUMBER}.gitfix.dev"

          comments_json="[]"
          page=1
          while :; do
            page_json="$(curl -fsS \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100&page=${page}")"
            comments_json="$(jq -s '.[0] + .[1]' \
              <(printf '%s\n' "$comments_json") \
              <(printf '%s\n' "$page_json"))"
            count="$(printf '%s\n' "$page_json" | jq 'length')"
            if [ "$count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          comment_body="$(printf '%s\n' \
            "$comment_marker" \
            "## Preview Environment Deployed" \
            "" \
            "Your PR preview environment is now available:" \
            "" \
            "**UI:** ${ui_url}" \
            "" \
            "Deployed commit: \`${PR_HEAD_SHA}\`" \
            "" \
            "Preview deployments are approval-gated by the \`preview-env\` label. To redeploy after new commits, remove and re-add the label." \
            "" \
            "---" \
            "*This comment is automatically updated on each deployment.*")"

          escaped_body="$(printf '%s' "$comment_body" | jq -Rs .)"
          comment_id="$(printf '%s' "$comments_json" | jq -r --arg marker "$comment_marker" '
            [.[] | select(.user.login == "github-actions[bot]" and (.body | startswith($marker))) | .id][0] // empty
          ')"
          if [ -n "$comment_id" ]; then
            curl -fsS -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -d "{\"body\": $escaped_body}" >/dev/null
          else
            curl -fsS -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -d "{\"body\": $escaped_body}" >/dev/null
          fi

      - name: Post deploy failure comment
        if: failure() && steps.deploy_preview.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          comment_body="$(printf '%s\n' \
            "## Preview Environment Deployment Failed" \
            "" \
            "The preview deployment for commit \`${PR_HEAD_SHA}\` failed." \
            "" \
            "**Workflow:** ${RUN_URL}")"
          escaped_body="$(printf '%s' "$comment_body" | jq -Rs .)"
          curl -fsS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\": $escaped_body}" >/dev/null

      - name: Clean PR checkout
        if: failure() && steps.deploy_preview.outcome == 'failure'
        run: rm -rf "$PR_CHECKOUT_DIR"

  teardown:
    name: Teardown Preview
    # No actor gate here: teardown only checks out the trusted default branch
    # and runs teardown-pr.sh with the PR number (no PR-authored code executes).
    # A 'closed' event's sender is often the automation bot merging its own PR,
    # so gating on actor permission here would skip cleanup and leak previews.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'preview-env')) ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'preview-env')
      )
    # The propr label must target the same single host used by deploy.
    runs-on: [self-hosted, linux, x64, propr]
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_CHECKOUT_DIR: pr-checkout/pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Tear down PR preview
        run: sh ./scripts/teardown-pr.sh "$PR_NUMBER"

      - name: Clean PR checkout
        if: always()
        run: rm -rf "$PR_CHECKOUT_DIR"
