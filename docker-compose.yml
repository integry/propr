services:
  redis:
    image: redis:alpine
    container_name: gitfix-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - gitfix-net

  daemon:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gitfix-daemon
    command: npm run daemon
    volumes:
      - ./logs:/usr/src/app/logs
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor
    env_file:
      - .env
    environment:
      - GITHUB_BOT_USERNAME=gitfixio[bot]
    depends_on:
      redis:
        condition: service_started
    networks:
      - gitfix-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gitfix-worker
    command: npm run worker
    volumes:
      - ./logs:/usr/src/app/logs
      - ./repos:/usr/src/app/repos
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor
      - ~/.claude:/root/.claude
      - ~/.gemini:/root/.gemini
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/claude-logs:/tmp/claude-logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    networks:
      - gitfix-net

  analysis-worker:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gitfix-analysis-worker
    command: npm run analysis-worker
    volumes:
      - ./logs:/usr/src/app/logs
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor:ro
      - /tmp/claude-logs:/tmp/claude-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    networks:
      - gitfix-net

  web-ui:
    build:
      context: .
      dockerfile: gitfix-ui/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: gitfix-web-ui
    ports:
      # Allow injection of UI_PORT for PR preview environments, default to 5173
      - '${UI_PORT:-5173}:5173'
    networks:
      - gitfix-net

  dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gitfix-dashboard-api
    command: sh -c "cd /usr/src/app/packages/dashboard && npx tsx server.ts"
    ports:
      # Allow injection of API_PORT for PR preview environments, default to 4000
      - '${API_PORT:-4000}:4000'
    volumes:
      - ~/.claude:/root/.claude:ro
      - ./data:/usr/src/app/data
      - /tmp/claude-logs:/tmp/claude-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/git-processor:/tmp/git-processor
      - ./.env:/usr/src/app/.env:ro
    env_file:
      - .env
    environment:
      - CONFIG_REPO_PATH=/tmp/config_repo
      # Allow injection of API_PUBLIC_URL for PR preview environments
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:4000}
    depends_on:
      redis:
        condition: service_started
      daemon:
        condition: service_started
    networks:
      - gitfix-net

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    container_name: gitfix-docs
    ports:
      - '8080:3000'
    networks:
      - gitfix-net
    restart: unless-stopped

networks:
  gitfix-net:
    driver: bridge

volumes:
  redis_data:
