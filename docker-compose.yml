# NOTE: This compose file requires the HOME environment variable to be set.
# Agent credential directories are mounted at ${HOME}/.<agent> on both the host
# and inside containers so path references remain valid when spawning sibling
# agent containers. In CI or systemd contexts where HOME may be unset, export it
# explicitly before running docker-compose (e.g., export HOME=/root).
#
# PREFLIGHT: Before starting, create credential and cache directories for ALL
# agents you intend to use (Docker will create missing directories as root-owned
# otherwise, which can cause write failures):
#   mkdir -p ~/.claude ~/.codex ~/.gemini /tmp/propr-vibe-prompts
#
# For Vibe support, also create:
#   mkdir -p ~/.vibe
#
# For production deployments that only use a subset of agents, use the launcher
# (docker/launcher/) which conditionally mounts only configured agent directories.
# This compose file is intended for development environments.
services:
  redis:
    image: redis:alpine
    ports:
      # Expose Redis for PR preview environments to share sessions
      # REDIS_EXTERNAL_PORT allows different ports for different stacks
      - '${REDIS_EXTERNAL_PORT:-6380}:6379'
    volumes:
      - redis_data:/data
    networks:
      - propr-net

  daemon:
    build:
      context: .
      dockerfile: Dockerfile.node
    init: true
    command: npm run daemon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/usr/src/app/logs
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor
      # Docker socket for PR preview deployments
      - /var/run/docker.sock:/var/run/docker.sock
      # Worktrees directory for PR branch checkouts
      - /tmp/pr-worktrees:/tmp/pr-worktrees
      # Mount .env for deploy-pr.sh script
      - ./.env:/usr/src/app/.env:ro
    env_file:
      - .env
    environment:
      - GITHUB_BOT_USERNAME=${GITHUB_BOT_USERNAME:-propr.dev[bot]}
      - STAGING_ENV_FILE=/usr/src/app/.env
    depends_on:
      redis:
        condition: service_started
    networks:
      - propr-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.node
    init: true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: npm run worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/usr/src/app/logs
      - ./repos:/usr/src/app/repos
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor
      # Mount agent credentials at the same path on both sides so the worker
      # can pass host-valid paths when spawning sibling agent containers.
      # IMPORTANT: Create any missing directories before starting:
      #   mkdir -p ~/.claude ~/.codex ~/.gemini ~/.vibe
      # Docker will create them as root-owned if they do not exist.
      - ${HOME:?HOME must be set}/.claude:${HOME:?HOME must be set}/.claude
      - ${HOME:?HOME must be set}/.gemini:${HOME:?HOME must be set}/.gemini
      - ${HOME:?HOME must be set}/.codex:${HOME:?HOME must be set}/.codex
      - ${HOME:?HOME must be set}/.vibe:${HOME:?HOME must be set}/.vibe:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/claude-logs:/tmp/claude-logs
      # Vibe prompt cache — mounted by default so Vibe works when MISTRAL_API_KEY
      # is set. PREFLIGHT: mkdir -p /tmp/propr-vibe-prompts
      - /tmp/propr-vibe-prompts:/tmp/propr-vibe-prompts
    env_file:
      - .env
    environment:
      - CLAUDE_CONFIG_PATH=${HOME:?HOME must be set}/.claude
      - CODEX_CONFIG_PATH=${HOME:?HOME must be set}/.codex
      - GEMINI_CONFIG_PATH=${HOME:?HOME must be set}/.gemini
      - VIBE_CONFIG_PATH=${HOME:?HOME must be set}/.vibe
    depends_on:
      redis:
        condition: service_started
    networks:
      - propr-net

  analysis-worker:
    build:
      context: .
      dockerfile: Dockerfile.node
    init: true
    command: npm run analysis-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/usr/src/app/logs
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor:ro
      # Vibe prompt cache — mounted by default for consistency with worker.
      - /tmp/propr-vibe-prompts:/tmp/propr-vibe-prompts:rw
      - /tmp/claude-logs:/tmp/claude-logs:ro
      - ${HOME:?HOME must be set}/.claude:${HOME:?HOME must be set}/.claude:ro
      - ${HOME:?HOME must be set}/.gemini:${HOME:?HOME must be set}/.gemini:ro
      - ${HOME:?HOME must be set}/.codex:${HOME:?HOME must be set}/.codex:ro
      - ${HOME:?HOME must be set}/.vibe:${HOME:?HOME must be set}/.vibe:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - CLAUDE_CONFIG_PATH=${HOME:?HOME must be set}/.claude
      - CODEX_CONFIG_PATH=${HOME:?HOME must be set}/.codex
      - GEMINI_CONFIG_PATH=${HOME:?HOME must be set}/.gemini
      - VIBE_CONFIG_PATH=${HOME:?HOME must be set}/.vibe
    depends_on:
      redis:
        condition: service_started
    networks:
      - propr-net

  indexing-worker:
    build:
      context: .
      dockerfile: Dockerfile.node
    init: true
    command: npm run indexing-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/usr/src/app/logs
      - ./data:/usr/src/app/data
      - /tmp/git-processor:/tmp/git-processor
      - ${HOME:?HOME must be set}/.claude:${HOME:?HOME must be set}/.claude:ro
      - ${HOME:?HOME must be set}/.gemini:${HOME:?HOME must be set}/.gemini:ro
      - ${HOME:?HOME must be set}/.codex:${HOME:?HOME must be set}/.codex:ro
      - ${HOME:?HOME must be set}/.vibe:${HOME:?HOME must be set}/.vibe:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/claude-logs:/tmp/claude-logs
    env_file:
      - .env
    environment:
      - CLAUDE_CONFIG_PATH=${HOME:?HOME must be set}/.claude
      - CODEX_CONFIG_PATH=${HOME:?HOME must be set}/.codex
      - GEMINI_CONFIG_PATH=${HOME:?HOME must be set}/.gemini
      - VIBE_CONFIG_PATH=${HOME:?HOME must be set}/.vibe
      # How often to scan for repos needing indexing (default: 5 minutes)
      - INDEXING_SCAN_INTERVAL_MS=${INDEXING_SCAN_INTERVAL_MS:-300000}
      # How often to re-index repos (default: 24 hours)
      - INDEXING_REINDEX_INTERVAL_MS=${INDEXING_REINDEX_INTERVAL_MS:-86400000}
    depends_on:
      redis:
        condition: service_started
    networks:
      - propr-net

  web-ui:
    build:
      context: .
      dockerfile: propr-ui/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_OAUTH_API_URL=${VITE_OAUTH_API_URL}
    ports:
      # Allow injection of UI_PORT for PR preview environments, default to 5173
      - '${UI_PORT:-5173}:5173'
    networks:
      - propr-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.node
    init: true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: sh -c "cd /usr/src/app/packages/api && npx tsx server.ts"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Allow injection of API_PORT for PR preview environments, default to 4000
      - '${API_PORT:-4000}:4000'
    volumes:
      - ${HOME:?HOME must be set}/.claude:${HOME:?HOME must be set}/.claude:ro
      - ${HOME:?HOME must be set}/.gemini:${HOME:?HOME must be set}/.gemini:ro
      - ${HOME:?HOME must be set}/.codex:${HOME:?HOME must be set}/.codex:ro
      - ${HOME:?HOME must be set}/.vibe:${HOME:?HOME must be set}/.vibe:ro
      - ./data:/usr/src/app/data
      - /tmp/claude-logs:/tmp/claude-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/git-processor:/tmp/git-processor
      # Vibe prompt cache — mounted by default for consistency with worker.
      - /tmp/propr-vibe-prompts:/tmp/propr-vibe-prompts
      # Worktrees directory for PR branch checkouts
      - /tmp/pr-worktrees:/tmp/pr-worktrees
      # Mount the env file - uses STAGING_ENV_FILE if set, defaults to ./.env
      - ${STAGING_ENV_FILE:-./.env}:/usr/src/app/.env:ro
    env_file:
      # Use the same env file for environment variable injection
      - ${STAGING_ENV_FILE:-.env}
    environment:
      - CLAUDE_CONFIG_PATH=${HOME:?HOME must be set}/.claude
      - CODEX_CONFIG_PATH=${HOME:?HOME must be set}/.codex
      - GEMINI_CONFIG_PATH=${HOME:?HOME must be set}/.gemini
      - VIBE_CONFIG_PATH=${HOME:?HOME must be set}/.vibe
      - CONFIG_REPO_PATH=/tmp/config_repo
      # Allow injection of API_PUBLIC_URL for PR preview environments
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:4000}
      # Allow injection of FRONTEND_URL for CORS in PR preview environments
      - FRONTEND_URL=${FRONTEND_URL:-https://ui.gitfix.dev}
      # Allow injection of GH_OAUTH_CALLBACK_URL for PR preview environments
      - GH_OAUTH_CALLBACK_URL=${GH_OAUTH_CALLBACK_URL:-https://api.gitfix.dev/api/auth/github/callback}
      # Allow PR previews to share sessions via host Redis
      - SESSION_REDIS_HOST=${SESSION_REDIS_HOST:-redis}
      - SESSION_REDIS_PORT=${SESSION_REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_started
      daemon:
        condition: service_started
    networks:
      - propr-net

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      # Allow injection of DOCS_PORT for PR preview environments, default to 8080
      - '${DOCS_PORT:-8080}:3000'
    networks:
      - propr-net
    restart: unless-stopped

networks:
  propr-net:
    driver: bridge

volumes:
  redis_data:
