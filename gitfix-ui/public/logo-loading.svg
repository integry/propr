<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spinner { 
        animation: spin 2s linear infinite;
        transform-origin: center;
      }
    </style>
  </defs>
  <g class="spinner" stroke="#E63946" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M100 20 L170 80 L170 120 L100 180 L30 120 L30 80 Z"/>
    <path d="M100 20 L30 80"/>
    <path d="M100 20 L170 80"/>
    <path d="M30 80 L100 100"/>
    <path d="M170 80 L100 100"/>
    <path d="M30 120 L100 100"/>
    <path d="M170 120 L100 100"/>
    <path d="M100 100 L100 180"/>
    <circle cx="100" cy="100" r="8" fill="#E63946"/>
    <circle cx="30" cy="100" r="8" fill="#E63946"/>
    <circle cx="170" cy="100" r="8" fill="#E63946"/>
    <path d="M100 130 L105 145 L120 148 L108 158 L111 173 L100 165 L89 173 L92 158 L80 148 L95 145 Z" fill="#E63946"/>
  </g>
</svg>
