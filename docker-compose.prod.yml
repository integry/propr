version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - propr-redis-data:/data
    networks:
      - propr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_URL:-http://localhost}
        VITE_APP_URL: ${FRONTEND_APP_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "80:80"
      - "4000:4000"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DASHBOARD_API_PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET}
      GH_OAUTH_CLIENT_ID: ${GH_OAUTH_CLIENT_ID}
      GH_OAUTH_CLIENT_SECRET: ${GH_OAUTH_CLIENT_SECRET}
      GH_OAUTH_CALLBACK_URL: ${GH_OAUTH_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DB_FILENAME: /app/data/propr.sqlite
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
      OPENCODE_CONFIG_PATH: ${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}
      OPENCODE_LEGACY_CONFIG_PATH: ${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}
    volumes:
      - propr-sqlite-data:/app/data
      # Agent config mounts used by version resolution and image listing
      # Comment out unused credential mounts to avoid Docker creating empty
      # host directories for agents you do not use.
      - ~/.claude:/root/.claude:ro
      - ~/.codex:/root/.codex:ro
      - ~/.gemini:/root/.gemini:ro
      - ${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}:${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}:ro
      - ${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}:${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}:ro
      - ${HOST_OPENCODE_DATA_DIR:-${HOME:?HOME must be set}/.local/share/opencode}:${HOST_OPENCODE_DATA_DIR:-${HOME:?HOME must be set}/.local/share/opencode}:ro
    depends_on:
      redis:
        condition: service_healthy
      daemon:
        condition: service_started
    networks:
      - propr-network

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /usr/src/app/data/propr.sqlite
    volumes:
      - ./logs:/usr/src/app/logs
      - propr-sqlite-data:/usr/src/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/daemon.js"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # Vibe prompt cache — active with sane defaults so setting MISTRAL_API_KEY
      # is sufficient for API-key auth. PREFLIGHT: create the host directory
      # before starting (mkdir -p /tmp/propr-vibe-prompts && chown to your
      # worker user) — Docker creates missing bind-mount dirs as root.
      VIBE_PROMPT_CACHE_DIR: ${VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      HOST_VIBE_PROMPT_CACHE_DIR: ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      # --- Vibe agent (config-file auth, alternative to API-key) ---
      VIBE_CONFIG_PATH: ${VIBE_CONFIG_PATH:-/root/.vibe}
      OPENCODE_CONFIG_PATH: ${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}
      OPENCODE_LEGACY_CONFIG_PATH: ${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /usr/src/app/data/propr.sqlite
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
    volumes:
      - ./logs:/usr/src/app/logs
      - ./repos:/usr/src/app/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - propr-sqlite-data:/usr/src/app/data
      - ~/.claude:/root/.claude:ro
      - ~/.codex:/root/.codex:ro
      - ~/.gemini:/root/.gemini:ro
      # Mount OpenCode credential paths at identical host/container paths.
      # The worker spawns sibling agent containers through the host Docker
      # socket, so OPENCODE_CONFIG_PATH must be host-valid.
      - ${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}:${HOST_OPENCODE_LEGACY_DIR:-${HOME:?HOME must be set}/.opencode}:ro
      - ${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}:${HOST_OPENCODE_XDG_DIR:-${HOME:?HOME must be set}/.config/opencode}:ro
      # Service-side visibility only; runtime OpenCode agents mount the saved
      # configPath unless XDG_DATA_HOME points under OPENCODE_CONFIG_PATH.
      - ${HOST_OPENCODE_DATA_DIR:-${HOME:?HOME must be set}/.local/share/opencode}:${HOST_OPENCODE_DATA_DIR:-${HOME:?HOME must be set}/.local/share/opencode}:ro
      # Comment out unused credential mounts to avoid Docker creating empty
      # host directories for agents you do not use. The OpenCode agent runtime
      # still mounts only the saved agent configPath; for file auth, prefer the
      # xdg-data workaround described in docs/docs/architecture/opencode-integration.md.
      # Vibe prompt cache — mounted by default so API-key auth works without
      # manual edits. PREFLIGHT: create and own the host directory before starting:
      #   mkdir -p "${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}"
      - ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}:/tmp/propr-vibe-prompts
      # Vibe config-file auth. Mounts host config to the same path the worker
      # passes to sibling agent containers.
      - ${HOST_VIBE_DIR:-/root/.vibe}:${VIBE_CONFIG_PATH:-/root/.vibe}:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/worker.js"]

networks:
  propr-network:
    driver: bridge

volumes:
  propr-redis-data:
  propr-sqlite-data:
