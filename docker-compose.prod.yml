version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - propr-redis-data:/data
    networks:
      - propr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_URL:-http://localhost}
        VITE_APP_URL: ${FRONTEND_APP_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "80:80"
      - "4000:4000"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DASHBOARD_API_PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET}
      GH_OAUTH_CLIENT_ID: ${GH_OAUTH_CLIENT_ID}
      GH_OAUTH_CLIENT_SECRET: ${GH_OAUTH_CLIENT_SECRET}
      GH_OAUTH_CALLBACK_URL: ${GH_OAUTH_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DB_FILENAME: /app/data/propr.sqlite
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
    volumes:
      - propr-sqlite-data:/app/data
      # Add agent credential mounts with a deployment-specific override file.
      # Keeping them out of the base production compose file avoids Docker
      # creating missing host credential directories as root-owned folders.
      # Example OpenCode override:
      #   - /home/propr/.config/opencode:/home/propr/.config/opencode:ro
      #   - /home/propr/.local/share/opencode:/home/propr/.local/share/opencode:rw
    depends_on:
      redis:
        condition: service_healthy
      daemon:
        condition: service_started
    networks:
      - propr-network

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /usr/src/app/data/propr.sqlite
    volumes:
      - ./logs:/usr/src/app/logs
      - propr-sqlite-data:/usr/src/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/daemon.js"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # Vibe prompt cache — active with sane defaults so setting MISTRAL_API_KEY
      # is sufficient for API-key auth. PREFLIGHT: create the host directory
      # before starting (mkdir -p /tmp/propr-vibe-prompts && chown to your
      # worker user) — Docker creates missing bind-mount dirs as root.
      VIBE_PROMPT_CACHE_DIR: ${VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      HOST_VIBE_PROMPT_CACHE_DIR: ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      # --- Vibe agent (config-file auth, alternative to API-key) ---
      VIBE_CONFIG_PATH: ${VIBE_CONFIG_PATH:-/root/.vibe}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /usr/src/app/data/propr.sqlite
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
    volumes:
      - ./logs:/usr/src/app/logs
      - ./repos:/usr/src/app/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - propr-sqlite-data:/usr/src/app/data
      # Add Claude/Codex/Gemini/OpenCode credential mounts with a deployment-
      # specific override file. The launcher conditionally mounts HOST_*
      # credential directories and is the preferred production path for agent
      # credential auth. Vibe keeps the legacy defaults below for compatibility.
      # Example OpenCode override:
      #   environment:
      #     OPENCODE_CONFIG_PATH: /home/propr/.config/opencode
      #     HOST_OPENCODE_DATA_DIR: /home/propr/.local/share/opencode
      #   volumes:
      #     - /home/propr/.config/opencode:/home/propr/.config/opencode:ro
      #     - /home/propr/.local/share/opencode:/home/propr/.local/share/opencode:rw
      # Vibe prompt cache — mounted by default so API-key auth works without
      # manual edits. PREFLIGHT: create and own the host directory before starting:
      #   mkdir -p "${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}"
      - ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}:/tmp/propr-vibe-prompts
      # Vibe config-file auth. Mounts host config to the same path the worker
      # passes to sibling agent containers.
      - ${HOST_VIBE_DIR:-/root/.vibe}:${VIBE_CONFIG_PATH:-/root/.vibe}:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/worker.js"]

networks:
  propr-network:
    driver: bridge

volumes:
  propr-redis-data:
  propr-sqlite-data:
