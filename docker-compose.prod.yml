version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - propr-redis-data:/data
    networks:
      - propr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_URL:-http://localhost}
        VITE_APP_URL: ${FRONTEND_APP_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "80:80"
      - "4000:4000"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DASHBOARD_API_PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET}
      GH_OAUTH_CLIENT_ID: ${GH_OAUTH_CLIENT_ID}
      GH_OAUTH_CLIENT_SECRET: ${GH_OAUTH_CLIENT_SECRET}
      GH_OAUTH_CALLBACK_URL: ${GH_OAUTH_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DB_FILENAME: /app/data/propr.sqlite
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
    volumes:
      - propr-sqlite-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      daemon:
        condition: service_started
    networks:
      - propr-network

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /app/data/propr.sqlite
    volumes:
      - ./logs:/app/logs
      - propr-sqlite-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/daemon.js"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # Vibe prompt cache: required when MISTRAL_API_KEY is set.
      # Both vars should point to the same host directory.
      # PREFLIGHT: create before starting: mkdir -p "${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}"
      VIBE_PROMPT_CACHE_DIR: ${VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      HOST_VIBE_PROMPT_CACHE_DIR: ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}
      # Config-file auth: to enable, you MUST uncomment BOTH of the following:
      #   1. VIBE_CONFIG_PATH (here)
      #   2. The HOST_VIBE_DIR volume mount in the volumes section below.
      # Uncommenting only one will cause a broken deployment at runtime.
      # API-key auth (MISTRAL_API_KEY above) does not require either.
      # VIBE_CONFIG_PATH: ${HOST_VIBE_DIR}
      ALLOWED_ORGS: ${ALLOWED_ORGS}
      DB_FILENAME: /app/data/propr.sqlite
      SYSTEM_TASK_SECRET: ${SYSTEM_TASK_SECRET}
    volumes:
      - ./logs:/app/logs
      - ./repos:/app/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - propr-sqlite-data:/app/data
      # Vibe prompt cache bind mount.
      # PREFLIGHT: mkdir -p "${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}"
      - ${HOST_VIBE_PROMPT_CACHE_DIR:-/tmp/propr-vibe-prompts}:/tmp/propr-vibe-prompts
      # Config-file auth for Vibe (instead of MISTRAL_API_KEY). To enable:
      #   1. Set HOST_VIBE_DIR in .env to the host path of your .vibe directory.
      #   2. Uncomment the volume mount below.
      #   3. Uncomment VIBE_CONFIG_PATH in the environment section above.
      # WARNING: Both the env var and the volume mount must be uncommented
      # together. A partial uncomment will silently break the deployment.
      # - ${HOST_VIBE_DIR}:${HOST_VIBE_DIR}:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - propr-network
    command: ["node", "dist/src/worker.js"]

networks:
  propr-network:
    driver: bridge

volumes:
  propr-redis-data:
  propr-sqlite-data:
